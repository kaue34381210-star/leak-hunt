name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and validate distributions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Check tag matches package version
        run: |
          package_version="$(python -c 'from leak_hunt.versao import __version__; print(__version__)')"
          test "v${package_version}" = "${GITHUB_REF_NAME}"
        env:
          PYTHONPATH: src
      - name: Install build tools
        run: python -m pip install build twine
      - name: Build wheel and source distribution
        run: python -m build
      - name: Validate distribution metadata
        run: python -m twine check dist/*
      - name: Store distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/leak-hunt
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish distributions with Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
